name: 3. Testar Backend (Python)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**.md"
      - ".azdo/**"
      - ".devcontainer/**"
      - ".github/**"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "**.md"
      - ".azdo/**"
      - ".devcontainer/**"
      - ".github/**"
  workflow_call:
  workflow_dispatch:

jobs:
  test_package:
    name: Test ${{ matrix.os }} Python ${{ matrix.python_version }} Node ${{ matrix.node_version }}
    runs-on: ${{ matrix.os }}
    # Matriz simplificada (v2.1.0): template pedagógico não precisa testar
    # 2 OS × 5 Python versions × 2 Node versions = 20 jobs do template upstream.
    # Aluno usa Python 3.13 (.python-version) + Node 22, ambiente Linux do CI.
    # Para reabilitar matriz completa, descomentar abaixo.
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python_version: ["3.13"]
        node_version: ["22"]
        # Backup completo (template upstream):
        # os: ["ubuntu-latest", "windows-latest"]
        # python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        # node_version: ["20.14", "22"]
    steps:
        - uses: actions/checkout@v6
          with:
            # Fetch full history so diff-cover can compute a merge base with origin/main
            fetch-depth: 0
        - name: Install uv
          uses: astral-sh/setup-uv@v7
          with:
            enable-cache: true
            version: "0.9.5"
            cache-dependency-glob: "requirements**.txt"
            python-version: ${{ matrix.python_version }}
            activate-environment: true
        - name: Setup node
          uses: actions/setup-node@v6
          with:
            node-version: ${{ matrix.node_version }}
        - name: Build frontend
          run: |
            cd ./app/frontend
            npm install
            npm run build
        - name: Check i18n translations
          run: npx -y @lingual/i18n-check@0.8.12 --locales app/frontend/src/locales -s en -f i18next -r summary
        # HelpSphere — Sessao 9.2 cont: pyodbc 5.2.0 nao tem wheel cp314 publicado
        # ainda. Em Python 3.14 ubuntu, uv pip install tenta compilar source ->
        # falha em sql.h sem unixodbc-dev. Fix: garantir headers ODBC + driver.
        # Linux runners: instalar via apt. Windows runners: msodbcsql18 ja vem
        # pre-instalado via Visual Studio Build Tools no GitHub Actions image.
        - name: Install ODBC dev headers (Linux only — pyodbc source compile)
          if: runner.os == 'Linux'
          run: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends unixodbc-dev
        - name: Install dependencies
          run: |
            uv pip install -r requirements-dev.txt
        - name: Lint with ruff
          run: ruff check .
        - name: Check types with ty
          run: ty check
        - name: Check formatting with black
          run: black . --check --verbose
        - name: Run Python tests
          if: runner.os != 'Windows'
          run: pytest -s -vv --cov --cov-report=xml --cov-fail-under=90
        - name: Check diff coverage
          if: runner.os != 'Windows'
          run: |
            BASE_REF="${{ github.base_ref }}"
            if [ -z "$BASE_REF" ]; then BASE_REF="main"; fi
            git fetch origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
            diff-cover coverage.xml --compare-branch="origin/$BASE_REF" --fail-under=90
        - name: Run E2E tests with Playwright
          id: e2e
          if: runner.os != 'Windows'
          run: |
            playwright install chromium --with-deps
            pytest tests/e2e.py --tracing=retain-on-failure
        - name: Upload test artifacts
          if: ${{ failure() && steps.e2e.conclusion == 'failure' }}
          uses: actions/upload-artifact@v7
          with:
            name: playwright-traces${{ matrix.python_version }}
            path: test-results
